<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a0a0a"/>

  <!-- Pizza circle (base) -->
  <circle cx="256" cy="256" r="190" fill="#d97706"/>
  <!-- Crust ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#92400e" stroke-width="28"/>

  <!-- Tomato sauce inner circle -->
  <circle cx="256" cy="256" r="162" fill="#dc2626"/>

  <!-- Slice lines -->
  <line x1="256" y1="66" x2="256" y2="446" stroke="#b91c1c" stroke-width="3" opacity="0.4"/>
  <line x1="256" y1="256" x2="90" y2="140" stroke="#b91c1c" stroke-width="3" opacity="0.4" transform="rotate(60 256 256)"/>
  <line x1="256" y1="256" x2="90" y2="140" stroke="#b91c1c" stroke-width="3" opacity="0.4" transform="rotate(120 256 256)"/>
  <line x1="256" y1="256" x2="90" y2="140" stroke="#b91c1c" stroke-width="3" opacity="0.4" transform="rotate(180 256 256)"/>
  <line x1="256" y1="256" x2="90" y2="140" stroke="#b91c1c" stroke-width="3" opacity="0.4" transform="rotate(240 256 256)"/>
  <line x1="256" y1="256" x2="90" y2="140" stroke="#b91c1c" stroke-width="3" opacity="0.4" transform="rotate(300 256 256)"/>

  <!-- Cheese blobs -->
  <ellipse cx="256" cy="180" rx="38" ry="28" fill="#fde68a" opacity="0.9"/>
  <ellipse cx="320" cy="290" rx="32" ry="24" fill="#fde68a" opacity="0.9"/>
  <ellipse cx="190" cy="300" rx="30" ry="22" fill="#fde68a" opacity="0.9"/>
  <ellipse cx="256" cy="340" rx="26" ry="20" fill="#fde68a" opacity="0.85"/>

  <!-- Pepperoni circles -->
  <circle cx="256" cy="176" r="20" fill="#7f1d1d"/>
  <circle cx="256" cy="176" r="14" fill="#991b1b"/>

  <circle cx="316" cy="240" r="18" fill="#7f1d1d"/>
  <circle cx="316" cy="240" r="12" fill="#991b1b"/>

  <circle cx="196" cy="240" r="18" fill="#7f1d1d"/>
  <circle cx="196" cy="240" r="12" fill="#991b1b"/>

  <circle cx="256" cy="310" r="18" fill="#7f1d1d"/>
  <circle cx="256" cy="310" r="12" fill="#991b1b"/>

  <circle cx="330" cy="330" r="15" fill="#7f1d1d"/>
  <circle cx="330" cy="330" r="10" fill="#991b1b"/>

  <circle cx="182" cy="330" r="15" fill="#7f1d1d"/>
  <circle cx="182" cy="330" r="10" fill="#991b1b"/>
</svg>
